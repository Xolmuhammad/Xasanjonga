<section id="menu" class="py-20 relative border-t border-white/5">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center mb-16">
                <p class="text-primary-500 font-bold mb-3 tracking-widest uppercase text-sm">Bizning Menyumiz</p>
                <h2 class="text-4xl md:text-5xl font-extrabold text-white">Ommabop Taomlar</h2>
                <div class="w-24 h-1 bg-primary-500 mx-auto mt-6 rounded-full"></div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                {% for product in products %}
                <div class="glass-card rounded-2xl p-5 flex flex-col h-full group cursor-pointer"
                    onclick="window.location.href='{% url 'product_detail' product.slug %}'">
                    <div class="relative rounded-xl overflow-hidden img-zoom-container mb-5 aspect-square bg-white/5">
                        <img src="{{ product.get_image }}"
                            alt="Burger" class="w-full h-full object-cover">
                        <div
                            class="absolute top-3 right-3 bg-dark-900/90 backdrop-blur-md px-2.5 py-1.5 rounded-lg text-sm font-bold flex items-center gap-1.5 border border-white/10">
                            <i class="fas fa-star text-yellow-400"></i> 4.8
                        </div>
                    </div>
                    <div class="flex-1 flex flex-col">
                        <h3 class="text-xl font-bold text-white group-hover:text-primary-400 transition mb-2">
                            {{ product.name }}
                        </h3>
                        <p class="text-sm text-gray-400 mb-5 line-clamp-2 leading-relaxed">
                            {{ product.description }}
                        </p>
                        <div class="mt-auto flex items-center justify-between pt-4 border-t border-white/10">
                            <span class="text-2xl font-bold text-white">{{ product.price }} <span
                                    class="text-sm text-gray-400 font-normal">so'm</span></span>
                            <button onclick="addToCart(event, 'Shoh Burger')"
                                class="w-12 h-12 rounded-full bg-white/10 hover:bg-primary-500 text-white flex items-center justify-center transition shadow-lg hover:shadow-primary-500/40 group-hover:bg-primary-500">
                                <i class="fas fa-cart-plus"></i>
                            </button>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>

            <!-- Pagination -->
            <div class="mt-16 flex justify-center items-center gap-2">
                <button
                    class="w-10 h-10 rounded-xl glass flex items-center justify-center text-gray-400 hover:text-white hover:bg-primary-500 hover:border-primary-500 transition disabled:opacity-50 disabled:cursor-not-allowed"
                    disabled>
                    <i class="fas fa-chevron-left text-sm"></i>
                </button>
                <button
                    class="w-10 h-10 rounded-xl bg-primary-500 text-white font-bold shadow-lg shadow-primary-500/30 flex items-center justify-center transition hover:-translate-y-0.5"
                    aria-current="page">
                    1
                </button>
                <button
                    class="w-10 h-10 rounded-xl glass flex items-center justify-center text-gray-400 hover:text-white hover:bg-primary-500 hover:border-primary-500 transition font-medium hover:-translate-y-0.5">
                    2
                </button>
                <button
                    class="w-10 h-10 rounded-xl glass flex items-center justify-center text-gray-400 hover:text-white hover:bg-primary-500 hover:border-primary-500 transition font-medium hover:-translate-y-0.5">
                    3
                </button>
                <span class="text-gray-500 flex items-end justify-center w-6 pb-2">...</span>
                <button
                    class="w-10 h-10 rounded-xl glass flex items-center justify-center text-gray-400 hover:text-white hover:bg-primary-500 hover:border-primary-500 transition font-medium hover:-translate-y-0.5">
                    8
                </button>
                <button
                    class="w-10 h-10 rounded-xl glass flex items-center justify-center text-gray-400 hover:text-white hover:bg-primary-500 hover:border-primary-500 transition hover:-translate-y-0.5">
                    <i class="fas fa-chevron-right text-sm"></i>
                </button>
            </div>
        </div>
    </section>
